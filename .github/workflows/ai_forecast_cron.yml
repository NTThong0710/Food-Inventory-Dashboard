name: Daily AI Forecast Update

on:
  schedule:
    # Chạy vào 17:00 UTC (Tương đương 00:00 - Nửa đêm giờ Việt Nam)
    - cron: '0 17 * * *'
  
  # Cho phép bro có một nút mồi chạy bằng tay (Manual trigger) trên giao diện GitHub
  workflow_dispatch:

jobs:
  run-ai-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Kéo source code về máy chủ ảo
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cài đặt thư viện (Theo đúng requirements.txt)
        run: pip install -r scripts/requirements.txt

      - name: Khởi động bộ máy AI Python
        # Bơm KEY ẩn danh từ hệ thống két sắt của Github sang file Python
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }} 
        run: python scripts/ai_forecast.py
